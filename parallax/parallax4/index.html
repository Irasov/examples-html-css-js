<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
    <script src="libs/gsap/gsap.min.js" defer></script>
    <script src="libs/gsap/ScrollTrigger.min.js" defer></script>
    <script src="libs/gsap/ScrollSmoother.min.js" defer></script>
    <script src="js/app.js" defer></script>
    <title>Parallax scroll</title>
  </head>
  <body>
    <div class="wrapper">
      <div class="content">
        <header class="header">
          <div class="layers">
            <div class="layer__header">
              <div class="layers__caption">Welcome to Parallax</div>
              <div class="layers__title">Summer forest edge</div>
            </div>
            <div
              class="layer layers__base"
              style="background-image: url(./img/layer-base.jpg)"
            ></div>
            <div
              class="layer layers__middle"
              style="background-image: url(./img/layer-middle.png)"
            ></div>
            <div
              class="layer layers__front"
              style="background-image: url(./img/layer-front.png)"
            ></div>
          </div>
        </header>
        <main class="mainpage" style="background-image: url(./img/glade.jpg)">
          <div class="mainpage__content">
            <div class="mainpage__title">To be continued</div>
            <div class="mainpage__subtitle">
              Lorem ipsum dolor sit amet consectetur adipisicing elit. Assumenda eum vitae nihil
              quisquam illum? Culpa sequi iure debitis alias iste porro saepe repellat molestias
              mollitia distinctio, odio voluptatum repudiandae vel?
            </div>
          </div>
          <div class="copy">© WebDesign Master</div>
        </main>
      </div>
    </div>
  </body>
</html>
